services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: mssql
    ports:
      - "1433:1433"
    environment:
      SA_PASSWORD: "${SA_PASSWORD}"
      ACCEPT_EULA: "Y"
    restart: always

  peopleapi:
    build:
      context: ./PeopleApi
      dockerfile: Dockerfile
    depends_on:
      - mssql
    ports:
      - "5001:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DockerConnection=Server=mssql;Database=${SQL_DATABASE};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}

  identityapi:
    build:
      context: ./IdentityApi
      dockerfile: Dockerfile
    depends_on:
      - mssql
    ports:
      - "5003:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DockerConnection=Server=mssql;Database=${SQL_DATABASE};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}

  postapi:
    build:
      context: ./PostApi
      dockerfile: Dockerfile
    depends_on:
      - mssql
    ports:
      - "5004:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - ConnectionStrings__DockerConnection=Server=mssql;Database=${SQL_DATABASE};User Id=sa;Password=${SA_PASSWORD};TrustServerCertificate=True;
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}

  socialmediaapp:
    build:
      context: ./SocialMediaApp
      dockerfile: Dockerfile
    depends_on:
      - identityapi
      - postapi
      - peopleapi
    ports:
      - "5002:8080"
    environment:
      - ASPNETCORE_ENVIRONMENT=Production
      - IdentityApiUrl=http://identityapi:8080/api
      - PostApiUrl=http://postapi:8080/api
      - PeopleApiUrl=http://peopleapi:8080/api
      - Jwt__SecretKey=${JWT_SECRET_KEY}
      - Jwt__Issuer=${JWT_ISSUER}
      - Jwt__Audience=${JWT_AUDIENCE}
